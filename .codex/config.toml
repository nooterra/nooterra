# ============================================================================
# PROFILES - Quick mode switching
# ============================================================================

[profiles.safe]
sandbox_mode = "workspace-write"
approval_policy = "untrusted"

[profiles.review]
model = "gpt-5-pro"
model_reasoning_effort = "high"
approval_policy = "on-failure"

[profiles.lightweight]
model = "gpt-4.1-mini"
approval_policy = "never"

[profiles.claude]
model = "claude-sonnet-4-20250514"
model_provider = "anthropic"

# ============================================================================
# MODEL PROVIDERS - Multi-provider support
# ============================================================================

[model_providers.anthropic]
name = "Anthropic Claude"
base_url = "https://api.anthropic.com/v1"
env_key = "ANTHROPIC_API_KEY"
wire_api = "chat"

[model_providers.openai]
name = "OpenAI"
base_url = "https://api.openai.com/v1"
env_key = "OPENAI_API_KEY"
wire_api = "responses"
request_max_retries = 5
stream_max_retries = 10
stream_idle_timeout_ms = 600000

[model_providers.ollama]
name = "Ollama Local"
base_url = "http://localhost:11434/v1"
wire_api = "chat"

[model_providers.together]
name = "Together AI"
base_url = "https://api.together.xyz/v1"
env_key = "TOGETHER_API_KEY"
wire_api = "chat"

[model_providers.groq]
name = "Groq"
base_url = "https://api.groq.com/openai/v1"
env_key = "GROQ_API_KEY"
wire_api = "chat"

# ============================================================================
# REASONING & VERBOSITY
# ============================================================================
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "medium"
model_context_window = 128000
model_max_output_tokens = 16384

# ============================================================================
# OBSERVABILITY - Enable for debugging
# ============================================================================
[otel]
environment = "dev"
exporter = "none"
log_user_prompt = false

# ============================================================================
# TUI & NOTIFICATIONS
# ============================================================================
[tui]
notifications = true

file_opener = "vscode"
hide_agent_reasoning = false
show_raw_agent_reasoning = false

# ============================================================================
# HISTORY
# ============================================================================
[history]
persistence = "save-all"

# ============================================================================
# PROJECT DOCS
# ============================================================================
project_doc_max_bytes = 100000
project_doc_fallback_filenames = ["AGENTS.md", "CONTRIBUTING.md", "README.md"]
