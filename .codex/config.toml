# ============================================================================
# NOOTERRA CODEX CONFIGURATION
# Full internet access + comprehensive MCP server ecosystem
# ============================================================================

# Default model - use latest GPT
model = "gpt-5.1"

# DANGER MODE: Full access - no sandbox restrictions
sandbox_mode = "danger-full-access"

# Approval policy - never pause for approval (full autonomy)
approval_policy = "never"

# ============================================================================
# FEATURE FLAGS - Enable ALL capabilities
# ============================================================================
[features]
# Web search - CRITICAL for internet access
web_search_request = true

# Streamable shell for better terminal interaction
streamable_shell = true

# Unified PTY-backed exec tool
unified_exec = true

# Image viewing
view_image_tool = true

# Freeform patch tool for flexible code edits
apply_patch_freeform = true

# Rust MCP client for OAuth support
rmcp_client = true

# Ghost commits for version tracking
ghost_commit = true

# ============================================================================
# SHELL ENVIRONMENT - Pass through all dev tools
# ============================================================================
[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false

# Exclude only truly sensitive credentials
exclude = [
  "AWS_SECRET_ACCESS_KEY",
  "AZURE_CLIENT_SECRET", 
  "GCP_SERVICE_ACCOUNT_KEY",
  "PRIVATE_KEY",
  "*_PASSWORD"
]

# ============================================================================
# MCP SERVERS - Comprehensive startup ecosystem
# ============================================================================

# --- INFRASTRUCTURE & DEPLOYMENT ---

[mcp_servers.railway]
command = "npx"
args = ["-y", "@railway/mcp-server"]
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 180

[mcp_servers.github]
command = "gh"
args = ["mcp"]
enabled = true
startup_timeout_sec = 15
tool_timeout_sec = 120

[mcp_servers.vercel]
command = "npx"
args = ["-y", "@vercel/mcp"]
enabled = true
startup_timeout_sec = 30

