name: launch-synthetic-smokes

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which environment to smoke
        required: true
        default: both
        type: choice
        options:
          - staging
          - production
          - both
  schedule:
    - cron: "17 * * * *"
    - cron: "43 14 * * *"

permissions:
  contents: read

jobs:
  staging_hourly:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '17 * * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'staging' || inputs.target == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run staging launch synthetic smokes
        env:
          NOOTERRA_BASE_URL: ${{ secrets.NOOTERRA_STAGING_BASE_URL }}
          NOOTERRA_WEBSITE_BASE_URL: ${{ secrets.NOOTERRA_STAGING_WEBSITE_BASE_URL }}
          NOOTERRA_TENANT_ID: ${{ secrets.NOOTERRA_STAGING_TENANT_ID || 'tenant_default' }}
          NOOTERRA_ONBOARDING_PROBE_EMAIL: ${{ secrets.NOOTERRA_STAGING_ONBOARDING_PROBE_EMAIL || 'probe@nooterra.work' }}
          NOOTERRA_API_KEY: ${{ secrets.NOOTERRA_STAGING_API_KEY }}
        run: |
          set -euo pipefail
          npm run -s test:ops:launch-synthetic-smokes -- \
            --environment staging \
            --report artifacts/gates/launch-synthetic-smoke.staging.json \
            --public-onboarding-report artifacts/gates/public-onboarding-gate.staging.json \
            --host-success-report artifacts/gates/onboarding-host-success-gate.staging.json \
            --metrics-dir artifacts/ops/onboarding-host-success/staging
      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: launch-synthetic-smokes-staging-${{ github.run_id }}
          path: |
            artifacts/gates/launch-synthetic-smoke.staging.json
            artifacts/gates/public-onboarding-gate.staging.json
            artifacts/gates/onboarding-host-success-gate.staging.json
            artifacts/ops/onboarding-host-success/staging
          if-no-files-found: error

  production_daily:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '43 14 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'production' || inputs.target == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run production launch synthetic smokes
        env:
          NOOTERRA_BASE_URL: ${{ secrets.NOOTERRA_PRODUCTION_BASE_URL }}
          NOOTERRA_WEBSITE_BASE_URL: ${{ secrets.NOOTERRA_PRODUCTION_WEBSITE_BASE_URL }}
          NOOTERRA_TENANT_ID: ${{ secrets.NOOTERRA_PRODUCTION_TENANT_ID || 'tenant_default' }}
          NOOTERRA_ONBOARDING_PROBE_EMAIL: ${{ secrets.NOOTERRA_PRODUCTION_ONBOARDING_PROBE_EMAIL || 'probe@nooterra.work' }}
          NOOTERRA_API_KEY: ${{ secrets.NOOTERRA_PRODUCTION_API_KEY }}
        run: |
          set -euo pipefail
          npm run -s test:ops:launch-synthetic-smokes -- \
            --environment production \
            --report artifacts/gates/launch-synthetic-smoke.production.json \
            --public-onboarding-report artifacts/gates/public-onboarding-gate.production.json \
            --host-success-report artifacts/gates/onboarding-host-success-gate.production.json \
            --metrics-dir artifacts/ops/onboarding-host-success/production
      - name: Upload production smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: launch-synthetic-smokes-production-${{ github.run_id }}
          path: |
            artifacts/gates/launch-synthetic-smoke.production.json
            artifacts/gates/public-onboarding-gate.production.json
            artifacts/gates/onboarding-host-success-gate.production.json
            artifacts/ops/onboarding-host-success/production
          if-no-files-found: error
