name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr_issue_link_guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require linked Issue in PR body
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr && pr.body) ? String(pr.body) : "";
            const ok =
              /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i.test(body) ||
              /\brefs?\s+#\d+/i.test(body);
            if (!ok) {
              core.setFailed(
                "PR must link an Issue in the body (e.g. `Closes #123` or `Refs #123`)."
              );
            }

  changelog_guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Enforce CHANGELOG discipline for protocol/release-note PRs
        run: node scripts/ci/changelog-guard.mjs --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

  unit_tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run collections pipeline tests
        run: >
          npx tsx --test
          test/world-retraining-job.test.js
          test/synthetic/pipeline-integration.test.ts
      - name: Run full unit tests (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:test@127.0.0.1:5432/postgres

  dashboard_build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd dashboard && npm ci
      - name: Build dashboard
        run: cd dashboard && npx vite build

  runtime_hardening_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run runtime hardening tests
        run: >
          npx tsx --test
          test/runtime-crypto-utils.test.js
          test/runtime-billing-plan-limits.test.js
          test/runtime-router-integrations-auth.test.js
        continue-on-error: true
