# Nooterra Monorepo - Railway Configuration
# Uses Railpack (Railway's default builder)

[build]
# Use non-frozen lockfile install to avoid CI failures when lockfile is updated.
buildCommand = "corepack enable && pnpm install --no-frozen-lockfile && pnpm build"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
